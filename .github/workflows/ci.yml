name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Integration tests (envtest)
        run: make test-integration

      - name: Build
        run: make build

      # Helm template + workflow tests. All three are pure-template /
      # file-content checks — no cluster required, runs in <5 s.
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Helm template — key-rotation no-restart invariants
        run: bash test/helm/key-rotation-no-restart.sh

      - name: Helm template — chart-polish invariants
        run: bash test/helm/chart-polish.sh

      - name: Workflow — Trivy CVE gate present
        run: bash test/helm/release-workflow-cve-gate.sh

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t incidentary-operator:test .

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.23.0

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Run helm-based operator E2E
        run: bash test/e2e/helm-e2e.sh
        env:
          CLUSTER_NAME: operator-e2e-ci

      # `replicaCount: 2` zero-downtime upgrade test. Spawns its own kind
      # cluster so it doesn't share state with the helm-e2e.sh test
      # above; takes ~3-5 minutes including image build.
      - name: Run helm upgrade zero-downtime E2E
        run: bash test/e2e/helm-upgrade-e2e.sh
        env:
          CLUSTER_NAME: operator-upgrade-e2e-ci
          IMAGE: incidentary-operator:upgrade-e2e

      - name: Upload state snapshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: operator-e2e-state
          path: /tmp/operator-e2e-state.json
          if-no-files-found: ignore
