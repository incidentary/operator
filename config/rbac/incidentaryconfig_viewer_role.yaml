# This rule is not used by the project incidentary-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to incidentary.incidentary.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: incidentary-operator
    app.kubernetes.io/managed-by: kustomize
  name: incidentaryconfig-viewer-role
rules:
- apiGroups:
  - incidentary.incidentary.com
  resources:
  - incidentaryconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - incidentary.incidentary.com
  resources:
  - incidentaryconfigs/status
  verbs:
  - get
