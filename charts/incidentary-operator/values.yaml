# Incidentary operator Helm chart values.
#
# The only REQUIRED value is apiKey. Everything else has sensible defaults.
#
# Example install:
#
#   helm install incidentary oci://ghcr.io/incidentary/charts/operator \
#     --namespace incidentary-system --create-namespace \
#     --set apiKey=sk_live_...
#
# -----------------------------------------------------------------------------

# apiKey is the Incidentary workspace API key. REQUIRED.
# Stored in a Kubernetes Secret, referenced by the IncidentaryConfig CR.
apiKey: ""

# workspaceId is the Incidentary workspace identifier. REQUIRED alongside apiKey.
# This value is not a secret — it is embedded in every ingest batch as
# agent.workspace_id and the server uses it to route batches to the correct
# tenant. Without it, every batch is rejected with WORKSPACE_MISMATCH (422).
workspaceId: ""

# existingSecretName — use a pre-existing Secret instead of creating one from
# the apiKey value. When set, apiKey is ignored.
existingSecretName: ""

# existingSecretKey — the key within the existing Secret that holds the API
# token. Defaults to "token" when unset.
existingSecretKey: "token"

# Number of operator replicas. Two replicas with leader election gives
# hot-standby failover. Minimum 1, maximum 2.
replicaCount: 2

image:
  repository: ghcr.io/incidentary/operator
  # tag defaults to .Chart.AppVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -----------------------------------------------------------------------------
# Operator configuration — maps to IncidentaryConfig spec fields.
# -----------------------------------------------------------------------------
config:
  # Namespaces the operator scans. Empty = all namespaces except excluded.
  watchNamespaces: []

  # Namespaces explicitly excluded from scanning.
  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease

  # How often the operator re-discovers workloads and sends topology reports.
  reconciliationIntervalSeconds: 300

  # Event filter. Tier 1 events (crashes, OOMs, failures, deploys) always
  # pass regardless of this threshold.
  eventFilters:
    minSeverity: warning

  # Override the default ingest endpoint (advanced).
  ingestEndpoint: ""

  # Override the default topology endpoint (advanced).
  topologyEndpoint: ""

  # Override the default services-list endpoint (advanced). The reconciler
  # polls this to learn which services are SDK-registered.
  servicesEndpoint: ""

# -----------------------------------------------------------------------------
# Cluster identification — set by the operator's resource block.
# -----------------------------------------------------------------------------
cluster:
  # Human-readable cluster name, used as resource.k8s.cluster.name.
  # Strongly recommended — defaults to "unknown" when empty.
  name: ""

# -----------------------------------------------------------------------------
# Deployment — resource limits, node scheduling, security.
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    # CPU limit prevents an event-storm or initial cache sync from saturating
    # node CPU and starving co-located workloads. 500m gives ~5x burst headroom
    # over the steady-state working set (10–30m at idle, up to 200m during sync).
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

podLabels: {}
podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

# -----------------------------------------------------------------------------
# Health probes and metrics.
# -----------------------------------------------------------------------------
healthProbeBindAddress: ":8081"

# Metrics server bind address. ":8080" enables Prometheus scraping over plain
# HTTP (default — no cert-manager dependency, scrape-friendly out of the box).
# Set to "0" to disable, or to ":8443" with metricsSecure=true for mTLS.
metricsBindAddress: ":8080"

# Serve metrics over HTTPS. When false, the manager exposes /metrics on
# metricsBindAddress as plain HTTP — appropriate for in-cluster scraping over
# a private network. Set to true and provide a certificate via metricsCertPath
# for production scrapers that require TLS.
metricsSecure: false
