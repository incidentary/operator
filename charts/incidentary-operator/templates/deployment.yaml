apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "incidentary-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incidentary-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "incidentary-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "incidentary-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "incidentary-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--leader-elect=true"
            - "--health-probe-bind-address={{ .Values.healthProbeBindAddress }}"
            - "--metrics-bind-address={{ .Values.metricsBindAddress }}"
          env:
            - name: INCIDENTARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "incidentary-operator.apiKeySecretName" . }}
                  key: {{ include "incidentary-operator.apiKeySecretKey" . }}
            {{- if .Values.cluster.name }}
            - name: K8S_CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            {{- end }}
            - name: K8S_NAMESPACE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INCIDENTARY_RECONCILIATION_INTERVAL_SECONDS
              value: {{ .Values.config.reconciliationIntervalSeconds | quote }}
            {{- if .Values.config.ingestEndpoint }}
            - name: INCIDENTARY_INGEST_ENDPOINT
              value: {{ .Values.config.ingestEndpoint | quote }}
            {{- end }}
            {{- if .Values.config.topologyEndpoint }}
            - name: INCIDENTARY_TOPOLOGY_ENDPOINT
              value: {{ .Values.config.topologyEndpoint | quote }}
            {{- end }}
            {{- if .Values.config.servicesEndpoint }}
            - name: INCIDENTARY_SERVICES_ENDPOINT
              value: {{ .Values.config.servicesEndpoint | quote }}
            {{- end }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
