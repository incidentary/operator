{{- if .Values.networkPolicy.enabled }}
# NetworkPolicy template — off by default.
# Enable when the cluster runs a NetworkPolicy-aware CNI (Calico, Cilium,
# Antrea, etc.) and the operator's egress should be restricted.
#
# Egress rules:
#   - Kubernetes API server (TCP 443 / 6443 to kube-apiserver via
#     namespaced selector + the empty namespace selector that resolves
#     to the kube-system service)
#   - DNS (CoreDNS UDP/TCP 53)
#   - Incidentary backend (egress 443 to the configured ingest hostname,
#     left unrestricted by default — narrow with `egressTo` in values)
#
# Ingress rules:
#   - Prometheus scrape on the metrics port (default :8080) — only when
#     networkPolicy.allowPrometheusScrape=true.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "incidentary-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incidentary-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "incidentary-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    {{- if .Values.networkPolicy.allowPrometheusScrape }}
    - Ingress
    {{- end }}
  egress:
    # DNS — required for resolving the kube-apiserver and the Incidentary backend.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API server — required for all watch operations.
    #
    # A naive `namespaceSelector: {}` rule (all namespaces, no
    # podSelector) would in NetworkPolicy semantics permit TCP/443 +
    # TCP/6443 to *every* pod in *every* namespace, not just
    # kube-apiserver. That gives the operator pod a cluster-wide
    # TLS-egress surface that bears no relationship to its actual
    # purpose. We instead scope to
    # `kube-system` only (where the apiserver service lives in most
    # CNCF-conformant clusters), and operators wanting tighter
    # control can override `apiServerCidrs` with the control-plane
    # node CIDRs to remove pod-network reach entirely.
    {{- if .Values.networkPolicy.apiServerCidrs }}
    - to:
        {{- range .Values.networkPolicy.apiServerCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- else }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- end }}
    # Incidentary backend — TLS to the configured ingest hostname.
    {{- if .Values.networkPolicy.egressTo }}
    {{- range .Values.networkPolicy.egressTo }}
    - to:
        {{- toYaml .to | nindent 8 }}
      ports:
        {{- toYaml .ports | nindent 8 }}
    {{- end }}
    {{- else }}
    # Default: allow egress to any 443 (the chart can't know the customer's
    # ingest hostname; tighten with networkPolicy.egressTo in production).
    - ports:
        - protocol: TCP
          port: 443
    {{- end }}
  {{- if .Values.networkPolicy.allowPrometheusScrape }}
  ingress:
    # Prometheus scrape — open metrics port to the configured selector.
    - from:
        {{- toYaml .Values.networkPolicy.prometheusFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.metricsPort | default 8080 }}
  {{- end }}
{{- end }}
