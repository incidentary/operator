{{- if not .Values.existingSecretName }}
{{- if not .Values.apiKey }}
{{- fail "incidentary-operator: .Values.apiKey is required (or set .Values.existingSecretName to use a pre-existing Secret)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "incidentary-operator.apiKeySecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incidentary-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "incidentary-operator.apiKeySecretKey" . }}: {{ .Values.apiKey | quote }}
{{- end }}
