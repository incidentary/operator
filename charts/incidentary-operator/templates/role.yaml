apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "incidentary-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incidentary-operator.labels" . | nindent 4 }}
rules:
  # Leader election — the operator writes a Lease to claim leadership.
  # Scoped to the operator's own namespace so no cluster-wide write grant
  # is needed.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]

  # IncidentaryConfig status subresource updates. Scoped to the operator's
  # namespace because the CRD is namespaced.
  - apiGroups: ["incidentary.incidentary.io"]
    resources: ["incidentaryconfigs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["incidentary.incidentary.io"]
    resources: ["incidentaryconfigs/status"]
    verbs: ["get", "update", "patch"]
